server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /products {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /orders {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /products/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}