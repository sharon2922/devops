name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: sharon29/shoplite-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: sharon29/shoplite-frontend:latest

      - name: Trigger Jenkins deployment
        run: |
          # Get crumb and session cookie together
          curl -s -u "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASS }}" \
          -c /tmp/jenkins_cookies.txt \
          "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json" > /tmp/crumb.json
          
          CRUMB=$(cat /tmp/crumb.json | python3 -c "import sys,json; print(json.load(sys.stdin)['crumb'])")
          
          # Use same cookie session to trigger build
          curl -X POST "${{ secrets.JENKINS_URL }}/job/shoplite-deploy/build" \
          -b /tmp/jenkins_cookies.txt \
          -H "Jenkins-Crumb: $CRUMB" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASS }}"