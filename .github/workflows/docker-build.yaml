name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: sharon29/shoplite-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.frontend
          push: true
          tags: sharon29/shoplite-frontend:latest

      - name: Trigger Jenkins deployment
        run: |
          CRUMB_DATA=$(curl -s -u "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASS }}" \
          "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json")
          echo "Crumb data: $CRUMB_DATA"
          
          CRUMB=$(echo $CRUMB_DATA | python3 -c \
          "import sys,json; d=json.load(sys.stdin); print(d['crumb'])")
          echo "Crumb: $CRUMB"
          
          CRUMB_FIELD=$(echo $CRUMB_DATA | python3 -c \
          "import sys,json; d=json.load(sys.stdin); print(d['crumbRequestField'])")
          echo "Crumb field: $CRUMB_FIELD"
          
          curl -v -X POST "${{ secrets.JENKINS_URL }}/job/shoplite-deploy/build" \
          -H "$CRUMB_FIELD: $CRUMB" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASS }}"