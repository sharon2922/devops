name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: sharon29/shoplite-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.frontend
          push: true
          tags: sharon29/shoplite-frontend:latest

      - name: Trigger Jenkins deployment
        run: |
          curl -v -X POST "${{ secrets.JENKINS_URL }}/job/shoplite-deploy/build" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASS }}" \
          --cookie-jar cookies.txt \
          -c cookies.txt \
          $(curl -s -u "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASS }}" \
          -c cookies.txt \
          "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json" | \
          python3 -c "import sys,json; d=json.load(sys.stdin); print(f'-H \"{d[\"crumbRequestField\"]}: {d[\"crumb\"]}\"')")