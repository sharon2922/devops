services:
  backend:
    image: sharon29/shoplite-backend:latest
    container_name: shoplite_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: sharon29/shoplite-frontend:latest
    container_name: shoplite_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus