version: "3.9"

services:
  backend:
    image: sharon29/shoplite-backend:latest
    container_name: shoplite_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: sharon29/shoplite-frontend:latest
    container_name: shoplite_frontend
    restart: always
    ports:
      - "3000:80"