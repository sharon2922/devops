version: "3.9"

services:
  backend:
    build: .
    container_name: shoplite_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: shoplite_frontend
    restart: always
    ports:
      - "3000:80"